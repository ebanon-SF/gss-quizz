<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GS&S Security Quiz</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      max-width: 480px;
      margin: 20px auto;
      padding: 16px;
      background: #f7f7f7;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h2, h3 { margin-top: 0; }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #0176d3;
      box-shadow: 0 0 0 2px rgba(1,118,211,0.15);
    }
    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      background: white;
      margin: 6px 0 0 0;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #0176d3;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #0165b8; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .choice {
      display: block;
      margin: 8px 0;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
    }
    .choice:hover { background: #f0f7ff; border-color: #0176d3; }
    .small { color: #666; font-size: 14px; }
    .progress-bar {
      height: 10px;
      background: #e5e5e5;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill { height: 100%; background: #0176d3; }
    .star-rating { display: flex; justify-content: center; gap: 6px; margin: 10px 0; }
    .star { font-size: 30px; color: #c4c4c4; cursor: pointer; }
    .star.active, .star.hovered { color: #f4c542; }
    .logo { width: 200px; margin-bottom: 20px; mix-blend-mode: multiply; }
    .topbar { display: flex; justify-content: flex-end; margin-bottom: 8px; align-items: center; gap: 8px; }
    .lb-btn {
      background: none;
      border: 1px solid #0176d3;
      color: #0176d3;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      width: auto;
      margin: 0;
    }
    .lb-btn:hover { background: #f0f7ff; }
    .back-btn { background: #f5f5f5; color: #333; font-size: 14px; margin-top: 0; }
    .back-btn:hover { background: #e5e5e5; }
    .lb-row {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      margin: 6px 0;
      background: #f9f9f9;
      font-size: 14px;
    }
    .lb-row.me { background: #e8f0fe; font-weight: bold; }
    .lb-row.gold { background: #fff8e1; }
    .lb-rank { width: 28px; font-weight: bold; color: #555; }
    .lb-name { flex: 1; }
    .lb-pts { color: #0176d3; font-weight: bold; }
    .lb-divider { border: none; border-top: 1px dashed #ddd; margin: 12px 0; }
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 16px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e5e5;
      border-top-color: #0176d3;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-msg { font-size: 14px; color: #888; }
    .badge-new {
      display: inline-block;
      background: #e8f0fe;
      color: #0c447c;
      font-size: 12px;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
  </style>
</head>

function showSpinner(msg) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <p class="spinner-msg">${msg || 'Loading...'}</p>
      </div>
    </div>`;
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function thisMonth() {
  return new Date().toISOString().slice(0, 7);
}

// ─── PROFILE ──────────────────────────────────────────────
async function prefillProfile() {
  const prefix = document.getElementById('emailPrefix').value.trim();
  if (!prefix) return;
  const email = prefix + '@salesforce.com';
  try {
    const rows = await sb(`users?email=eq.${encodeURIComponent(email)}&select=full_name,country`);
    if (rows && rows.length > 0) {
      if (rows[0].country) document.getElementById('countrySelect').value = rows[0].country;
    }
  } catch(e) {}
}

async function getOrCreateUser(email) {
  let rows = await sb(`users?email=eq.${encodeURIComponent(email)}&select=*`);
  if (!rows || rows.length === 0) {
    await sb('users', {
      method: 'POST',
      prefer: 'return=representation',
      body: { email, first_seen: new Date().toISOString(), last_seen: new Date().toISOString() }
    });
    rows = await sb(`users?email=eq.${encodeURIComponent(email)}&select=*`);
  }
  return rows[0];
}

async function updateUserStats(email, isCorrect, points, questionId) {
  const user = await getOrCreateUser(email);
  const totalAttempts = (user.total_attempts || 0) + 1;
  const correctAnswers = (user.correct_answers || 0) + (isCorrect ? 1 : 0);
  const currentStreak = isCorrect ? (user.current_streak || 0) + 1 : 0;
  const bestStreak = Math.max(user.best_streak || 0, currentStreak);
  const totalPoints = (user.total_points || 0) + points;
  await sb(`users?email=eq.${encodeURIComponent(email)}`, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: {
      last_seen: new Date().toISOString(),
      total_attempts: totalAttempts,
      correct_answers: correctAnswers,
      current_streak: currentStreak,
      best_streak: bestStreak,
      total_points: totalPoints
    }
  });
}

// ─── QUESTIONS ────────────────────────────────────────────
async function getAttemptsToday(email) {
  const start = today() + 'T00:00:00.000Z';
  const end = today() + 'T23:59:59.999Z';
  const rows = await sb(`responses?email=eq.${encodeURIComponent(email)}&created_at=gte.${start}&created_at=lte.${end}&select=id`);
  return rows ? rows.length : 0;
}

async function getTotalPointsToday(email) {
  const start = today() + 'T00:00:00.000Z';
  const end = today() + 'T23:59:59.999Z';
  const rows = await sb(`responses?email=eq.${encodeURIComponent(email)}&created_at=gte.${start}&created_at=lte.${end}&select=points`);
  return rows ? rows.reduce((sum, r) => sum + (r.points || 0), 0) : 0;
}

async function getRecentQuestionIds(limit) {
  const rows = await sb(`responses?select=question_id&order=created_at.desc&limit=${limit * 3}`);
  const seen = [];
  if (!rows) return seen;
  for (const r of rows) {
    if (!seen.includes(r.question_id)) seen.push(r.question_id);
    if (seen.length >= limit) break;
  }
  return seen;
}

async function fetchNextQuestion(email, country) {
  const [attemptsToday, recentIds] = await Promise.all([
    getAttemptsToday(email),
    getRecentQuestionIds(10)
  ]);

  if (attemptsToday >= DAILY_MAX) {
    return { dailyLimitReached: true, attemptsToday, dailyMax: DAILY_MAX };
  }

  // Get eligible questions: ALL + user's country
  let questions = await sb(`questions?active=eq.true&select=*`);
  if (!questions) questions = [];

  // Filter by country
  questions = questions.filter(q =>
    q.country === 'ALL' || q.country === country
  );

  // Filter out recently seen
  let eligible = questions.filter(q => !recentIds.includes(q.id));
  if (eligible.length === 0) eligible = questions;
  if (eligible.length === 0) return { error: 'No questions available.' };

  // Pick random
  const q = eligible[Math.floor(Math.random() * eligible.length)];
  return {
    id: q.id,
    category: q.category,
    difficulty: q.difficulty,
    question: q.question,
    choices: [
      { key: 'A', text: q.choice_a },
      { key: 'B', text: q.choice_b },
      { key: 'C', text: q.choice_c },
      { key: 'D', text: q.choice_d }
    ],
    correctChoice: q.correct_choice,
    explanation: q.explanation,
    attemptsToday,
    dailyMax: DAILY_MAX
  };
}

// ─── FLOW ─────────────────────────────────────────────────
async function startQuiz() {
  const prefix = document.getElementById('emailPrefix').value.trim();
  const country = document.getElementById('countrySelect').value;
  if (!prefix) { alert('Please enter your Salesforce username.'); return; }
  if (!country) { alert('Please select your country.'); return; }
  _email = prefix + '@salesforce.com';
  _country = country;
  showSpinner('Loading your question...');
  try {
    const user = await getOrCreateUser(_email);
    // Save country if not set
    if (!user.country || user.country !== country) {
      await sb(`users?email=eq.${encodeURIComponent(_email)}`, {
        method: 'PATCH', prefer: 'return=minimal',
        body: { country }
      });
    }
    // Check if first time (no name)
    if (!user.full_name) {
      const q = await fetchNextQuestion(_email, _country);
      _nextQuestion = q;
      renderRegistration();
      return;
    }
    await loadNextQuestion();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function loadNextQuestion() {
  if (_nextQuestion && !_nextQuestion.error && !_nextQuestion.dailyLimitReached) {
    const q = _nextQuestion;
    _nextQuestion = null;
    if (q.dailyLimitReached) { renderDailyLimit(q); return; }
    renderQuestion(q);
    preloadNext();
    return;
  }
  showSpinner('Loading your question...');
  try {
    const q = await fetchNextQuestion(_email, _country);
    if (q.error) { alert(q.error); return; }
    if (q.dailyLimitReached) { renderDailyLimit(q); return; }
    renderQuestion(q);
    preloadNext();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function preloadNext() {
  _nextQuestion = null;
  fetchNextQuestion(_email, _country).then(q => { _nextQuestion = q; }).catch(() => {});
}

// ─── RENDER ───────────────────────────────────────────────
function renderRegistration() {
  document.getElementById('app').innerHTML = `
    <div class="card" style="text-align:center;">
      ${getLogo()}
      <div class="badge-new">First time here!</div>
      <h2 style="margin:0 0 6px;">Welcome, ${_email.split('@')[0]}!</h2>
      <p class="small" style="margin-bottom:16px;">What's your name? It'll appear on the leaderboard.</p>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input id="firstName" type="text" placeholder="First name"
          style="flex:1;padding:10px;border-radius:8px;border:1px solid #ccc;font-size:15px;">
        <input id="lastName" type="text" placeholder="Last name"
          style="flex:1;padding:10px;border-radius:8px;border:1px solid #ccc;font-size:15px;">
      </div>
      <button onclick="saveName()">Let's go!</button>
      <button onclick="skipName()" style="background:#f5f5f5;color:#333;margin-top:6px;">Skip for now</button>
    </div>`;
  document.getElementById('firstName').addEventListener('keypress', e => {
    if (e.key === 'Enter') document.getElementById('lastName').focus();
  });
  document.getElementById('lastName').addEventListener('keypress', e => {
    if (e.key === 'Enter') saveName();
  });
}

async function saveName() {
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  if (!firstName) { alert('Please enter at least your first name.'); return; }
  showSpinner('Saving your profile...');
  try {
    await sb(`users?email=eq.${encodeURIComponent(_email)}`, {
      method: 'PATCH', prefer: 'return=minimal',
      body: { full_name: (firstName + ' ' + lastName).trim() }
    });
    if (_nextQuestion) {
      const q = _nextQuestion;
      _nextQuestion = null;
      renderQuestion(q);
      preloadNext();
    } else {
      await loadNextQuestion();
    }
  } catch(e) { alert('Error: ' + e.message); }
}

function skipName() {
  if (_nextQuestion) {
    const q = _nextQuestion;
    _nextQuestion = null;
    renderQuestion(q);
    preloadNext();
  } else {
    loadNextQuestion();
  }
}

function renderDailyLimit(res) {
  document.getElementById('app').innerHTML = `
    <div class="card" style="text-align:center;">
      ${getLogo()}
      <h2>🎉 Well done!</h2>
      <p>You've completed ${res.attemptsToday} question(s) today.</p>
      <p class="small">Come back tomorrow for more!</p>
      <button class="lb-btn" onclick="renderLeaderboard()" style="width:100%;margin-top:12px;padding:12px;font-size:15px;">🏆 Access Leaderboard</button>
    </div>`;
}

function renderQuestion(q) {
  _currentQuestion = q;
  const pts = POINTS[q.difficulty.toLowerCase()] || 10;
  const choices = q.choices.map(c => `
    <label class="choice">
      <input type="radio" name="choice" value="${c.key}"> ${c.text}
    </label>`).join('');
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="topbar">
        <span style="font-size:12px;color:#888;">${_country || ''}</span>
        <button class="lb-btn" onclick="renderLeaderboard()">🏆 Leaderboard</button>
      </div>
      ${getLogo()}
      <p class="small">${q.category} &bull; ${q.difficulty} &bull; <strong style="color:#0176d3;">${pts} pts</strong></p>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${((q.attemptsToday + 1) / q.dailyMax) * 100}%"></div>
      </div>
      <h3>${q.question}</h3>
      ${choices}
      <button id="submitBtn" onclick="submitAnswer()">Submit</button>
    </div>`;
}

async function submitAnswer() {
  const selected = document.querySelector('input[name="choice"]:checked');
  if (!selected) { alert('Please select an answer.'); return; }
  const btn = document.getElementById('submitBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }

  const q = _currentQuestion;
  const isCorrect = selected.value.toUpperCase() === q.correctChoice.toUpperCase();
  const pts = isCorrect ? (POINTS[q.difficulty.toLowerCase()] || 10) : 0;

  try {
    // Write response
    await sb('responses', {
      method: 'POST', prefer: 'return=minimal',
      body: {
        email: _email,
        question_id: q.id,
        question_text: q.question,
        selected_choice: selected.value,
        correct_choice: q.correctChoice,
        is_correct: isCorrect,
        category: q.category,
        difficulty: q.difficulty,
        points: pts
      }
    });

    // Update user stats
    await updateUserStats(_email, isCorrect, pts, q.id);
    const totalPointsToday = await getTotalPointsToday(_email);

    document.getElementById('app').innerHTML = `
      <div class="card">
        ${getLogo()}
        <h2>${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</h2>
        ${isCorrect
          ? `<div style="background:#e8f5e9;border-radius:8px;padding:10px;margin:10px 0;font-size:15px;">+${pts} pts earned</div>`
          : `<div style="background:#ffeee8;border-radius:8px;padding:10px;margin:10px 0;font-size:15px;">0 pts — better luck next time!</div>`
        }
        <div style="background:#f0f7ff;border-radius:8px;padding:10px;margin:10px 0;font-size:15px;">
          🏆 Total today: <strong>${totalPointsToday} pts</strong>
        </div>
        <p><strong>Correct answer:</strong> ${q.correctChoice}</p>
        <p>${q.explanation || ''}</p>
        <hr>
        <p class="small"><strong>Rate this question</strong></p>
        <div id="starRating" class="star-rating">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        <textarea id="feedbackComment" placeholder="Optional comment..."
          style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;margin-top:10px;"></textarea>
        <button onclick="sendFeedback()">Send feedback &amp; continue</button>
        <button onclick="loadNextQuestion()" style="background:#aaa;margin-top:6px;">Skip feedback</button>
      </div>`;
    initStars();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function initStars() {
  _selectedRating = 0;
  document.querySelectorAll('.star').forEach(star => {
    star.addEventListener('mouseover', () => updateStars(star.dataset.value, false));
    star.addEventListener('mouseout', () => updateStars(_selectedRating, true));
    star.addEventListener('click', () => {
      _selectedRating = star.dataset.value;
      updateStars(_selectedRating, true);
    });
  });
}

function updateStars(value, locked) {
  document.querySelectorAll('.star').forEach(s => {
    s.classList.remove('active', 'hovered');
    if (s.dataset.value <= value) s.classList.add(locked ? 'active' : 'hovered');
  });
}

async function sendFeedback() {
  const comment = document.getElementById('feedbackComment').value;
  if (!_selectedRating) { alert('Please select a rating.'); return; }
  try {
    await sb('feedback', {
      method: 'POST', prefer: 'return=minimal',
      body: {
        email: _email,
        question_id: _currentQuestion.id,
        rating: parseInt(_selectedRating),
        comment
      }
    });
    document.getElementById('app').innerHTML = `
      <div class="card" style="text-align:center;">
        ${getLogo()}
        <h2>Thank you! 🙌</h2>
      </div>`;
    setTimeout(() => loadNextQuestion(), 1000);
  } catch(e) { alert('Error: ' + e.message); }
}

// ─── LEADERBOARD ──────────────────────────────────────────
async function renderLeaderboard() {
  showSpinner('Loading leaderboard...');
  try {
    const start = thisMonth() + '-01T00:00:00.000Z';
    const rows = await sb(`responses?created_at=gte.${start}&select=email,points`);

    // Aggregate by email
    const totals = {};
    if (rows) {
      rows.forEach(r => {
        totals[r.email] = (totals[r.email] || 0) + (r.points || 0);
      });
    }

    // Get full names
    const emails = Object.keys(totals);
    let nameMap = {};
    if (emails.length > 0) {
      const users = await sb(`users?email=in.(${emails.map(e => `"${e}"`).join(',')})&select=email,full_name`);
      if (users) users.forEach(u => { nameMap[u.email] = u.full_name || u.email.split('@')[0]; });
    }

    const sorted = Object.entries(totals)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5);

    const myRankAll = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    const myRank = myRankAll.findIndex(([e]) => e === _email) + 1;
    const myPoints = totals[_email] || 0;

    const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
    const rows_html = sorted.map(([email, pts], i) => `
      <div class="lb-row ${email === _email ? 'me' : ''} ${i === 0 ? 'gold' : ''}">
        <span class="lb-rank">${medals[i]}</span>
        <span class="lb-name">${nameMap[email] || email.split('@')[0]}${email === _email ? ' (you)' : ''}</span>
        <span class="lb-pts">${pts} pts</span>
      </div>`).join('');

    const mySection = myRank > 5 ? `
      <hr class="lb-divider">
      <div class="lb-row me">
        <span class="lb-rank">#${myRank}</span>
        <span class="lb-name">You</span>
        <span class="lb-pts">${myPoints} pts</span>
      </div>` : '';

    const month = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });

    document.getElementById('app').innerHTML = `
      <div class="card">
        ${getLogo()}
        <h3 style="text-align:center;margin-bottom:4px;">🏆 Top 5 This Month</h3>
        <p style="text-align:center;font-size:12px;color:#888;margin-bottom:16px;">${month}</p>
        ${sorted.length === 0
          ? '<p style="text-align:center;color:#aaa;margin:20px 0;">No scores yet this month!</p>'
          : rows_html}
        ${mySection}
        <button class="back-btn" onclick="loadNextQuestion()">← Back to quiz</button>
      </div>`;
  } catch(e) {
    alert('Error loading leaderboard: ' + e.message);
  }
}

// ─── ENTER KEY on login ───────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  const input = document.getElementById('emailPrefix');
  if (input) input.addEventListener('keypress', e => { if (e.key === 'Enter') startQuiz(); });
});
</script>
